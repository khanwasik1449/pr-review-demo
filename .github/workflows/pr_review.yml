name: PR Review Bot

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Run PR Review Bot
    runs-on: ubuntu-latest
    # Avoid exposing secrets to workflows triggered from forks.
    if: github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Antigravity CLI
        run: |
          pip install antigravity-cli

      - name: Run Explore Agent
        run: |
          antigravity run explore \
            --pr ${{ github.event.pull_request.number }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run Review Pipeline
        run: |
          antigravity run review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate Review Report
        run: |
          antigravity run summarize \
            > review.md

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("review.md", "utf8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Upload Review Report
        uses: actions/upload-artifact@v4
        with:
          name: review-report
          path: review.md
